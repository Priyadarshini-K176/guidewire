<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GigShield Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
    <h2>💰 GigShield Premium</h2>

    <label>Tier</label>
    <select id="tier">
        <option value="base">Base</option>
        <option value="plus">Plus</option>
        <option value="pro">Pro</option>
    </select>

    <label>Active Weeks</label>
    <input type="number" id="weeks" placeholder="e.g. 10">

    <label>Zone Risk</label>
    <input type="number" step="0.1" id="zone" placeholder="e.g. 1.1">

    <label>Weather Risk</label>
    <input type="number" step="0.1" id="weather" placeholder="e.g. 1.2">

    <button onclick="calculatePremium()">Calculate Premium</button>

    <div id="result"></div>
</div>

<div class="container" style="margin-top: 20px;">
    <h2>🛡️ Claim Management</h2>

    <label>Worker ID</label>
    <input type="number" id="workerId" placeholder="e.g. 1">

    <label>Trigger Type</label>
    <select id="triggerType">
        <option value="Heavy Rainfall">Heavy Rainfall</option>
        <option value="Severe Air Pollution">Severe Air Pollution</option>
        <option value="Extreme Heat">Extreme Heat</option>
        <option value="Curfew">Curfew</option>
        <option value="App Outage">App Outage</option>
    </select>

    <label>Zone</label>
    <input type="text" id="claimZone" placeholder="e.g. Koramangala">

    <button onclick="evaluateClaim()">Evaluate Claim</button>

    <div id="claimResult"></div>
</div>

<script src="script.js"></script>

</body>
</html>
